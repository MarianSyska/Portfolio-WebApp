<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Wartungsarbeiten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @font-face {
            font-family: 'AlteHaasGrotesk';
            src: url('home/static/home/fonts/AlteHaasGroteskRegular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'AlteHaasGrotesk';
            src: url('home/static/home/fonts/AlteHaasGroteskBold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --color-bg: #F5E8C7;
            --color-primary: #8B5E5E;
            --color-primary-dark: #6B3A3A;
            --color-primary-light: #A98686;
            --color-secondary: #D4A574;
            --color-secondary-light: #E8C9A0;
            --color-secondary-lighter: #F0DCC0;
            --color-text: #2C1810;
            --color-text-light: #F5F0E8;
            --color-text-muted: #8B7D6B;
            --color-white: #FFFFFF;
            --color-shadow: rgba(44, 24, 16, 0.1);
            --color-shadow-strong: rgba(44, 24, 16, 0.18);
            --font-primary: 'AlteHaasGrotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #2C1810 0%, #4A2C2C 35%, #6B3A3A 65%, #3D2020 100%);
            color: var(--color-text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(139, 94, 94, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 165, 116, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(107, 58, 58, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .maintenance-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-xl);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 12px 48px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .maintenance-card__icon {
            font-size: 3.5rem;
            color: var(--color-secondary);
            margin-bottom: 1rem;
            display: block;
        }

        .maintenance-card__title {
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-text-light);
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .maintenance-card__text {
            font-size: 1rem;
            color: var(--color-secondary-light);
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.85;
        }

        .maintenance-card__divider {
            width: 60px;
            height: 3px;
            background: var(--color-secondary);
            border-radius: 2px;
            margin: 0 auto 2rem;
        }

        .maintenance-card__contact {
            font-size: 0.85rem;
            color: var(--color-secondary-light);
            background: rgba(139,94,94,0.1);
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            display: inline-block;
        }

        .maintenance-card__contact i {
            margin-right: 6px;
            color: var(--color-secondary);
        }

        @media (max-width: 500px) {
            .maintenance-card {
                padding: 2rem 1.5rem;
            }
            .maintenance-card__title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <i class="bi bi-tools maintenance-card__icon"></i>
        <div class="maintenance-card__title">Under Maintenance</div>
        <div class="maintenance-card__divider"></div>
        <div class="maintenance-card__text">
            This site is currently being updated.<br>
            Please check back later.
        </div>
        <div class="maintenance-card__contact">
            <i class="bi bi-envelope-fill"></i>
            marian.syska@web.de
        </div>
    </div>
</body>
</html>
